name: Gate 3 Evidence Readiness

on:
  push:
  pull_request:

jobs:
  gate3-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install jsonschema pytest pyyaml
      - name: Gate 3 readiness tests
        run: |
          python -m pytest -q tests/evidence_status tests/privacy tests/external_data tests/contracts
          python scripts/register_external_dataset.py register
          python scripts/verify_external_dataset.py
          python scripts/run_gate3_evidence_pipeline.py --android-builds || true
      - name: Upload readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gate3-readiness
          path: |
            results/gate3/
            GATE3_GATE2_BASELINE_VERIFICATION.md
      - name: Summary
        run: |
          echo "## Gate 3 readiness" >> "$GITHUB_STEP_SUMMARY"
          echo "CI proves collection-ready software using synthetic/negative fixtures only." >> "$GITHUB_STEP_SUMMARY"
          echo "CI cannot produce GATE_3_PASS." >> "$GITHUB_STEP_SUMMARY"
