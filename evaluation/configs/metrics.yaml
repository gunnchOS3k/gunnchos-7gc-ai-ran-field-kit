schema_name: gunnchos.gate4.metrics
schema_version: 1.0.0
primary_metrics:
  - service_continuity_score
  - recovery_time_s
  - fairness_index
  - energy_cost_j
  - decision_latency_ms
secondary_metrics:
  - packet_loss_pct
  - jitter_ms
  - ntn_utilization_fraction
uncertainty:
  methods:
    - bootstrap
    - repeated_seed
    - scenario_range
  confidence_level: 0.95
  resampling_count: 1000
  seed: 0
